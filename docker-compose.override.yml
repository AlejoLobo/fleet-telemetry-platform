# Override local para ejecutar TimescaleDB en entornos sin límites de cgroup
# (p. ej. VMs de Cursor Cloud). timescaledb-tune falla al leer /sys/fs/cgroup/memory.max,
# por lo que se omite el autotuning; PostgreSQL usa su postgresql.conf por defecto.
services:
  timescaledb:
    environment:
      NO_TS_TUNE: "true"
