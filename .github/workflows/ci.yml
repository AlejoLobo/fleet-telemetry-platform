name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      - name: Restore
        run: dotnet restore backend/FleetTelemetry.sln

      - name: Build
        run: dotnet build backend/FleetTelemetry.sln --configuration Release --no-restore

      - name: Unit tests Application
        run: dotnet test backend/FleetTelemetry.Application.Tests --configuration Release --no-build --verbosity normal

      - name: Unit tests Worker
        run: dotnet test backend/FleetTelemetry.Worker.Tests --configuration Release --no-build --verbosity normal

      - name: Integration tests (TimescaleDB + Kafka)
        run: dotnet test backend/FleetTelemetry.Integration.Tests --configuration Release --no-build --verbosity normal

      - name: Vulnerable packages audit
        run: |
          set -euo pipefail
          projects=(
            backend/FleetTelemetry.Api/FleetTelemetry.Api.csproj
            backend/FleetTelemetry.Worker/FleetTelemetry.Worker.csproj
            backend/FleetTelemetry.Infrastructure/FleetTelemetry.Infrastructure.csproj
            backend/FleetTelemetry.Application/FleetTelemetry.Application.csproj
          )
          failed=0
          for proj in "${projects[@]}"; do
            echo "::group::Audit $proj"
            output=$(dotnet list "$proj" package --vulnerable --include-transitive --format json 2>/dev/null || dotnet list "$proj" package --vulnerable --include-transitive)
            echo "$output"
            if echo "$output" | grep -Eiq '"severity":\s*"(High|Critical)"|Severity[[:space:]]+(High|Critical)|>\s*(High|Critical)\s*<'; then
              echo "Vulnerable High/Critical packages found in $proj"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify package-lock.json
        run: test -f web/package-lock.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix web

      - name: Build
        run: npm run build --prefix web

  mobile:
    name: Mobile (Expo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    env:
      EXPO_PUBLIC_API_URL: http://localhost:5000
      EXPO_PUBLIC_VEHICLE_ID: VH-001
      EXPO_PUBLIC_DRIVER_ID: DRV-001
    steps:
      - uses: actions/checkout@v4

      - name: Verify package-lock.json
        run: test -f package-lock.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Export Android bundle
        run: npm run export
