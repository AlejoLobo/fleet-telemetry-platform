name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest
    services:
      kafka:
        image: confluentinc/confluent-local:7.6.1
        ports:
          - 9092:9092
        options: >-
          --health-cmd "kafka-broker-api-versions --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      timescaledb:
        image: timescale/timescaledb:2.17.2-pg16
        env:
          POSTGRES_USER: fleet
          POSTGRES_PASSWORD: fleet
          POSTGRES_DB: fleet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fleet -d fleet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      - name: Restore
        run: dotnet restore backend/FleetTelemetry.sln

      - name: Build
        run: dotnet build backend/FleetTelemetry.sln --configuration Release --no-restore

      - name: Unit tests Application
        run: dotnet test backend/FleetTelemetry.Application.Tests --configuration Release --no-build --verbosity normal

      - name: Unit tests Worker
        run: dotnet test backend/FleetTelemetry.Worker.Tests --configuration Release --no-build --verbosity normal

      - name: Integration tests (TimescaleDB + Kafka)
        env:
          FLEET_INTEGRATION_KAFKA_BOOTSTRAP: localhost:9092
          FLEET_INTEGRATION_DB_CONNECTION: Host=localhost;Port=5432;Database=fleet;Username=fleet;Password=fleet
        run: dotnet test backend/FleetTelemetry.Integration.Tests --configuration Release --no-build --verbosity normal

      - name: Vulnerable packages audit
        run: |
          set -euo pipefail
          projects=(
            backend/FleetTelemetry.Api/FleetTelemetry.Api.csproj
            backend/FleetTelemetry.Worker/FleetTelemetry.Worker.csproj
            backend/FleetTelemetry.Infrastructure/FleetTelemetry.Infrastructure.csproj
            backend/FleetTelemetry.Application/FleetTelemetry.Application.csproj
          )
          failed=0
          for proj in "${projects[@]}"; do
            echo "::group::Audit $proj"
            output=$(dotnet list "$proj" package --vulnerable --include-transitive --format json 2>/dev/null || dotnet list "$proj" package --vulnerable --include-transitive)
            echo "$output"
            if echo "$output" | grep -Eiq '"severity":\s*"(High|Critical)"|Severity[[:space:]]+(High|Critical)|>\s*(High|Critical)\s*<'; then
              echo "Vulnerable High/Critical packages found in $proj"
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

  infra:
    name: Infra validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.6.0"
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive infra/terraform

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Docker Compose config
        run: docker compose config --quiet

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify package-lock.json
        run: test -f web/package-lock.json

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix web

      - name: Lint
        run: npm run lint --prefix web

      - name: Typecheck
        run: npm run typecheck --prefix web

      - name: Unit tests
        run: npm run test:ci --prefix web

      - name: Build
        run: npm run build --prefix web

  mobile:
    name: Mobile (Expo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    env:
      EXPO_PUBLIC_API_URL: http://localhost:5000
      EXPO_PUBLIC_VEHICLE_ID: VH-001
      EXPO_PUBLIC_DRIVER_ID: DRV-001
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify package-lock.json
        run: test -f package-lock.json

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:ci

      - name: Export Android bundle
        run: npm run export
