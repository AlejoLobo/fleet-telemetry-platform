name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          include-prerelease: true

      - name: Restore
        run: dotnet restore backend/FleetTelemetry.sln

      - name: Build
        run: dotnet build backend/FleetTelemetry.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/FleetTelemetry.sln --configuration Release --no-build --verbosity normal

      - name: Vulnerable packages audit
        run: |
          OUTPUT=$(dotnet list backend/FleetTelemetry.Api/FleetTelemetry.Api.csproj package --vulnerable --include-transitive)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "high\|critical" && exit 1 || true

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify package-lock.json
        run: test -f web/package-lock.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix web

      - name: Build
        run: npm run build --prefix web

  mobile:
    name: Mobile (Expo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Verify package-lock.json
        run: test -f package-lock.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck
