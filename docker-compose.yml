services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    container_name: fleet-redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - "512M"
      - --overprovisioned
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --mode
      - dev-container
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: fleet-timescaledb
    environment:
      POSTGRES_USER: fleet
      POSTGRES_PASSWORD: fleet
      POSTGRES_DB: fleet
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet -d fleet"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleet-api
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Kafka__BootstrapServers: redpanda:9092
      TimescaleDb__ConnectionString: Host=timescaledb;Port=5432;Database=fleet;Username=fleet;Password=fleet
      Auth__Enabled: "false"
    depends_on:
      redpanda:
        condition: service_healthy
      timescaledb:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: fleet-worker
    environment:
      DOTNET_ENVIRONMENT: Development
      Kafka__BootstrapServers: redpanda:9092
      TimescaleDb__ConnectionString: Host=timescaledb;Port=5432;Database=fleet;Username=fleet;Password=fleet
    depends_on:
      redpanda:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    container_name: fleet-web
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  timescale_data:
