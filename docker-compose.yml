# Uso local con dotnet/npm (solo infra):
#   docker compose up -d
#
# Stack completo en contenedores (API + Worker + Web):
#   docker compose --profile app up -d --build
#
# Borrar contenedores NO limpia TimescaleDB: el volumen `timescale_data` conserva
# flota/telemetría de sesiones anteriores. Para DB limpia:
#   docker compose --profile app down -v
#
# Defaults de credenciales solo para desarrollo local.
# Connection strings derivan POSTGRES_USER, POSTGRES_PASSWORD y POSTGRES_DB.

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    container_name: fleet-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - "512M"
      - --overprovisioned
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --mode
      - dev-container
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-init:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    container_name: fleet-kafka-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        ensure_topic() {
          topic="$$1"
          partitions="$$2"
          if rpk topic list --brokers redpanda:9092 | awk 'NR>1 {print $$1}' | grep -Fxq "$$topic"; then
            echo "Topic already exists: $$topic"
          else
            rpk topic create "$$topic" --brokers redpanda:9092 --partitions "$$partitions"
            echo "Topic created: $$topic (partitions=$$partitions)"
          fi
        }
        ensure_topic telemetry.raw 1
        ensure_topic telemetry.dead-letter 1
        ensure_topic fleet.realtime 1
        echo "Kafka topics ready"
    restart: "no"

  timescaledb:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: fleet-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleet}
      POSTGRES_DB: ${POSTGRES_DB:-fleet}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-fleet} -d $${POSTGRES_DB:-fleet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    profiles: ["app"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleet-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Kafka__BootstrapServers: redpanda:9092
      TimescaleDb__ConnectionString: Host=timescaledb;Port=5432;Database=${POSTGRES_DB:-fleet};Username=${POSTGRES_USER:-fleet};Password=${POSTGRES_PASSWORD:-fleet}
      Auth__Enabled: "false"
      QueryLimits__OnlineThresholdMinutes: ${QueryLimits__OnlineThresholdMinutes:-1}
      QueryLimits__OnlineThresholdSeconds: ${QueryLimits__OnlineThresholdSeconds:-45}
      # Desactivado; si se activa, la ingesta POST /api/telemetry* sigue exenta (N devices / 3s).
      RateLimiting__Enabled: ${RateLimiting__Enabled:-false}
      RateLimiting__PermitLimit: ${RateLimiting__PermitLimit:-600}
      RateLimiting__WindowSeconds: ${RateLimiting__WindowSeconds:-60}
    depends_on:
      redpanda:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 45s

  worker:
    profiles: ["app"]
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: fleet-worker
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Development
      Kafka__BootstrapServers: redpanda:9092
      TimescaleDb__ConnectionString: Host=timescaledb;Port=5432;Database=${POSTGRES_DB:-fleet};Username=${POSTGRES_USER:-fleet};Password=${POSTGRES_PASSWORD:-fleet}
      Kafka__MaxProcessingAttempts: ${Kafka__MaxProcessingAttempts:-3}
      Kafka__RetryInitialDelayMilliseconds: ${Kafka__RetryInitialDelayMilliseconds:-500}
      Kafka__RetryMaxDelayMilliseconds: ${Kafka__RetryMaxDelayMilliseconds:-5000}
      Kafka__MaxDeadLetterPublishAttempts: ${Kafka__MaxDeadLetterPublishAttempts:-5}
      Kafka__MaxPollIntervalMilliseconds: ${Kafka__MaxPollIntervalMilliseconds:-300000}
      QueryLimits__OnlineThresholdMinutes: ${QueryLimits__OnlineThresholdMinutes:-1}
      QueryLimits__OnlineThresholdSeconds: ${QueryLimits__OnlineThresholdSeconds:-45}
      Sse__ConnectivityExpiryIntervalSeconds: ${Sse__ConnectivityExpiryIntervalSeconds:-5}
    depends_on:
      redpanda:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  web:
    profiles: ["app"]
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # En AWS ALB (FT-009) se inyecta vía .env; localmente localhost.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
        NEXT_PUBLIC_ONLINE_THRESHOLD_SECONDS: ${NEXT_PUBLIC_ONLINE_THRESHOLD_SECONDS:-45}
    container_name: fleet-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  timescale_data:
